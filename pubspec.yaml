name: flutter_live_session_assignment
description: "A production-quality Live Session Platform assignment."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Functional Programming
  dartz: ^0.10.1

  # Dependency Injection
  get_it: ^7.6.4

  # Networking
  dio: ^5.3.3
  json_annotation: ^4.8.1

  # Local Persistence (SQLite & Secure Storage)
  sqflite: ^2.3.0
  path: ^1.8.3
  flutter_secure_storage: ^9.0.0

  # UI & Utilities
  intl: ^0.18.1
  cached_network_image: ^3.3.0
  uuid: ^4.2.1
  video_player: ^2.8.1
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/
